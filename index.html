<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Experience</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    height: 100vh;
    background: black;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, Arial;
    overflow: hidden;
}

/* cinematic fade layers */
.layer {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    transition: opacity 2s ease;
}

#intro {
    font-size: 2em;
    opacity: 1;
}

#main {
    opacity: 0;
    font-size: 3em;
    text-align: center;
}

/* Apple-like glow */
.glow {
    text-shadow: 0 0 20px rgba(255,255,255,0.3);
}

/* button */
button {
    margin-top: 20px;
    padding: 14px 26px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
    background: white;
    color: black;
}
button:hover { opacity: 0.8; }

.typewriter {
    border-right: 2px solid white;
    white-space: nowrap;
    overflow: hidden;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro" class="layer">
    <div class="glow">Initializing experience…</div>
</div>

<!-- MAIN -->
<div id="main" class="layer">
    <div id="text" class="glow"></div>
    <button onclick="launch()">Start the moment</button>
</div>

<!-- AUDIO -->
<audio id="music" loop>
    <source src="https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/happy-birthday.mp3" type="audio/mpeg">
</audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
// cinematic sequence controller
setTimeout(() => {
    document.getElementById("intro").style.opacity = 0;
    document.getElementById("main").style.opacity = 1;
    typeWriter("A special moment is loading…");
}, 2500);

// typewriter effect
function typeWriter(text) {
    let i = 0;
    const el = document.getElementById("text");
    el.classList.add("typewriter");

    function run() {
        if (i < text.length) {
            el.innerHTML += text.charAt(i);
            i++;
            setTimeout(run, 60);
        } else {
            el.classList.remove("typewriter");
        }
    }
    run();
}

// main launch sequence
function launch() {
    const music = document.getElementById("music");
    music.play();

    document.getElementById("main").innerHTML = `
        <div class="glow">🎂 HAPPY BIRTHDAY 🎂</div>
        <div style="font-size:18px; margin-top:10px;">
            This is not a message. This is an event.
        </div>
    `;

    // cinematic confetti burst
    const duration = 4000;
    const end = Date.now() + duration;

    (function frame() {
        confetti({
            particleCount: 5,
            spread: 90,
            origin: { y: 0.6 }
        });

        if (Date.now() < end) {
            requestAnimationFrame(frame);
        }
    })();
}
</script>

</body>
</html>
