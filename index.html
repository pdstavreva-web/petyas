<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>You're Invited 🎉</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <div class="card" id="card">
      <h1>You're invited.</h1>
      <p class="subtitle">A very important event is happening.</p>

      <p class="details">
        🎂 Birthday Celebration<br>
        📅 Date: [PUT YOUR DATE HERE]<br>
        📍 Location: [PUT LOCATION HERE]
      </p>

      <div class="buttons">
        <button class="yes" onclick="yes()">Yes 🎉</button>
        <button class="no" onclick="no()">No</button>
      </div>
    </div>

    <div class="result hidden" id="result">
      <h1 id="message"></h1>
      <p class="small">We respect your decision… barely.</p>
    </div>

  </div>

  <canvas id="confetti"></canvas>

  <script src="script.js"></script>
</body>
</html>
